<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscillating Sine Wave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 90%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        canvas {
            display: block;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: #f9f9f9;
            margin-bottom: 30px;
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        label {
            font-weight: 600;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .label-value {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
        }
        
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: linear-gradient(to right, #667eea, #764ba2);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }
        
        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.2);
        }
        
        @media (max-width: 600px) {
            .controls {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 22px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Oscillating Sine Wave</h1>
        <canvas id="canvas"></canvas>
        
        <div class="controls">
            <div class="control-group">
                <label for="frequency">
                    Frequency
                    <span class="label-value" id="frequencyValue">1.0</span>
                </label>
                <input type="range" id="frequency" min="0.1" max="5" step="0.1" value="1">
            </div>
            
            <div class="control-group">
                <label for="amplitude">
                    Amplitude
                    <span class="label-value" id="amplitudeValue">1.0</span>
                </label>
                <input type="range" id="amplitude" min="0.1" max="2" step="0.1" value="1">
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const frequencySlider = document.getElementById('frequency');
        const amplitudeSlider = document.getElementById('amplitude');
        const frequencyValue = document.getElementById('frequencyValue');
        const amplitudeValue = document.getElementById('amplitudeValue');

        // Set canvas size
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let phase = 0;
        const animationSpeed = 0.05;

        function drawWave() {
            // Get current values from sliders
            const frequency = parseFloat(frequencySlider.value);
            const amplitude = parseFloat(amplitudeSlider.value);

            // Update displayed values
            frequencyValue.textContent = frequency.toFixed(1);
            amplitudeValue.textContent = amplitude.toFixed(1);

            // Clear canvas
            ctx.fillStyle = '#f9f9f9';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;

            for (let i = 0; i <= canvas.height; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            for (let i = 0; i <= canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }

            // Draw axes
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 2;
            const centerY = canvas.height / 2;

            ctx.beginPath();
            ctx.moveTo(0, centerY);
            ctx.lineTo(canvas.width, centerY);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, canvas.height);
            ctx.stroke();

            // Draw sine wave
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;
            ctx.beginPath();

            const pixelWidth = canvas.width;
            const baseAmplitude = (canvas.height / 4) * amplitude;

            for (let x = 0; x < pixelWidth; x++) {
                // Calculate sine wave value
                const angle = (x / pixelWidth) * 2 * Math.PI * frequency + phase;
                const y = centerY - Math.sin(angle) * baseAmplitude;

                if (x === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.stroke();

            // Update phase for animation
            phase += animationSpeed;

            // Continue animation
            requestAnimationFrame(drawWave);
        }

        // Start animation
        drawWave();

        // Update on slider input
        frequencySlider.addEventListener('input', () => {
            // Wave will update automatically in the animation loop
        });

        amplitudeSlider.addEventListener('input', () => {
            // Wave will update automatically in the animation loop
        });
    </script>
</body>
</html>
